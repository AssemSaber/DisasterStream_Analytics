  version: 2

models:
  - name: fact_flights
    columns:  
      - name: date_key
        tests:
          - relationships:
              to: ref('dim_date')
              field: date_id

      - name: disaster_type_id
        tests:
          - relationships:
              to: ref('dim_disaster_type')
              field: disaster_type_id

      - name: location_id
        tests:
          - relationships:
              to: ref('dim_location')
              field: location_id

      - name: team_id
        tests:
          - relationships:
              to: ref('dim_team')
              field: team_id
